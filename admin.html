<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin | Flora & Cia</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/global.css">

  
</head>
<body>
<div class="admin-layout">

  <!-- ── Topbar ─────────────────────────────────────────────── -->
  <header class="admin-topbar">
    <div class="admin-topbar__brand">
      <!-- Logo inline, idêntico ao do site público -->
      <a href="index.html" class="navbar__logo">
        <img src="assets/logo/ChatGPT Image 20 de jun. de 2026, 20_28_03.png" alt="" class="logo-mark">
      </a>
      <div>
        
      </div>
    </div>

    <nav class="admin-topbar__actions">
      <a href="../index.html" class="btn-link-site" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Ver site
      </a>
    </nav>
  </header>

  <!-- ── Conteúdo central ───────────────────────────────────── -->
  <main class="admin-content">

    <!-- Estatísticas -->
    <div class="admin-stats" role="region" aria-label="Resumo do catálogo">

      <div class="stat-card stat-card--total">
        <div class="stat-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m3 0-1 13a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 7"/>
          </svg>
        </div>
        <div>
          <div class="stat-card__value" id="stat-total">—</div>
          <div class="stat-card__label">Total de produtos</div>
        </div>
      </div>

      <div class="stat-card stat-card--active">
        <div class="stat-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 0 0 1.946-.806 3.42 3.42 0 0 1 4.438 0
                     3.42 3.42 0 0 0 1.946.806 3.42 3.42 0 0 1 3.138 3.138 3.42 3.42 0 0 0 .806 1.946
                     3.42 3.42 0 0 1 0 4.438 3.42 3.42 0 0 0-.806 1.946 3.42 3.42 0 0 1-3.138 3.138
                     3.42 3.42 0 0 0-1.946.806 3.42 3.42 0 0 1-4.438 0 3.42 3.42 0 0 0-1.946-.806
                     3.42 3.42 0 0 1-3.138-3.138 3.42 3.42 0 0 0-.806-1.946 3.42 3.42 0 0 1 0-4.438
                     3.42 3.42 0 0 0 .806-1.946 3.42 3.42 0 0 1 3.138-3.138z"/>
          </svg>
        </div>
        <div>
          <div class="stat-card__value" id="stat-ativos">—</div>
          <div class="stat-card__label">Ativos no catálogo</div>
        </div>
      </div>

      <div class="stat-card stat-card--inactive">
        <div class="stat-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
        </div>
        <div>
          <div class="stat-card__value" id="stat-inativos">—</div>
          <div class="stat-card__label">Ocultos do catálogo</div>
        </div>
      </div>
    </div>

    <!-- Barra de ferramentas -->
    <div class="admin-toolbar">
      <div class="admin-search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input
          type="search"
          id="admin-search"
          placeholder="Buscar produto por nome…"
          aria-label="Buscar produto por nome"
          autocomplete="off"
        >
      </div>

      <button type="button" class="btn-reset" id="btn-reset" title="Restaurar status original de todos os produtos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.69"/>
        </svg>
        Resetar tudo
      </button>
    </div>

    <!-- Lista de produtos (preenchida via JS) -->
    <div id="admin-list" role="region" aria-label="Lista de produtos por categoria"></div>

    <!-- Estado vazio (busca sem resultado) -->
    <div id="admin-empty" hidden aria-live="polite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="11" cy="11" r="7"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <p>Nenhum produto encontrado para "<strong id="admin-empty-term"></strong>"</p>
    </div>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer class="admin-footer">
    Flora &amp; Cia · Painel Administrativo ·
    As alterações são salvas automaticamente e aplicadas ao catálogo público.
  </footer>

</div><!-- /.admin-layout -->

<!-- Toast de feedback -->
<div id="admin-toast" role="status" aria-live="polite"></div>

<script src="js/admin.js"></script>
</body>
</html>
